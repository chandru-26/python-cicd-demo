# =============================================================================
# DOCKER COMPOSE - Python CI/CD Demo
# =============================================================================
#
# Docker Compose Fundamentals:
# ----------------------------
# Docker Compose defines multi-container applications in a single file.
# It's used for:
# - Local development environments
# - Integration testing in CI/CD
# - Running dependent services (databases, caches, etc.)
#
# Commands:
#   docker-compose up -d              # Start all services in background
#   docker-compose up --build         # Rebuild and start
#   docker-compose down               # Stop and remove containers
#   docker-compose down -v            # Also remove volumes
#   docker-compose logs -f            # Follow all logs
#   docker-compose logs -f app        # Follow specific service logs
#   docker-compose ps                 # List running services
#   docker-compose exec app bash      # Shell into service
#   docker-compose restart app        # Restart a service
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # APPLICATION SERVICE
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: python-cicd-demo:latest
    container_name: python-cicd-demo-app
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=Python CI/CD Demo
      - APP_ENV=development
      - APP_VERSION=1.0.0
      - APP_PORT=5000
      - LOG_LEVEL=INFO
      - SECRET_KEY=docker-compose-dev-key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    # Resource limits (similar to Kubernetes resource requests/limits)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================================================
  # NGINX REVERSE PROXY (Production-like setup)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: python-cicd-demo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
# Custom networks isolate services and provide DNS resolution
networks:
  app-network:
    driver: bridge
    name: cicd-demo-network

# =============================================================================
# VOLUMES (for persistent data)
# =============================================================================
volumes:
  app-logs:
    driver: local

