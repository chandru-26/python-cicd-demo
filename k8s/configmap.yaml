# =============================================================================
# KUBERNETES CONFIGMAP
# =============================================================================
#
# What is a ConfigMap?
# --------------------
# A ConfigMap stores non-sensitive configuration data as key-value pairs.
# It decouples configuration from container images, making images portable.
#
# How ConfigMaps are used:
# 1. Environment variables in pods
# 2. Command-line arguments
# 3. Configuration files mounted as volumes
#
# ConfigMap vs Secret:
# - ConfigMap: Non-sensitive data (app settings, feature flags)
# - Secret: Sensitive data (passwords, API keys, certificates)
#
# Best Practices:
# - Don't store sensitive data in ConfigMaps
# - Keep ConfigMaps small (< 1MB limit)
# - Use meaningful names and labels
# - Version ConfigMaps for rollback capability
#
# Commands:
#   kubectl create configmap app-config --from-literal=APP_ENV=production
#   kubectl create configmap app-config --from-file=config.properties
#   kubectl get configmaps -n python-cicd-demo
#   kubectl describe configmap app-config -n python-cicd-demo
#   kubectl edit configmap app-config -n python-cicd-demo
#
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: python-cicd-demo
  labels:
    app: python-cicd-demo
    component: configuration
data:
  # Application configuration
  APP_NAME: "Python CI/CD Demo"
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  APP_PORT: "5000"
  LOG_LEVEL: "INFO"
  
  # Feature flags (common in production)
  FEATURE_NEW_UI: "false"
  FEATURE_DARK_MODE: "true"
  
  # External service URLs
  # In production, these point to real services
  DATABASE_HOST: "postgres-service.database.svc.cluster.local"
  CACHE_HOST: "redis-service.cache.svc.cluster.local"

