# =============================================================================
# KUBERNETES SECRET
# =============================================================================
#
# What is a Secret?
# -----------------
# A Secret stores sensitive data like passwords, tokens, and keys.
# Secrets are base64-encoded (NOT encrypted by default!).
#
# ⚠️ IMPORTANT SECURITY NOTES:
# - Base64 is NOT encryption! It's just encoding.
# - Enable encryption at rest in production (EncryptionConfiguration)
# - Use external secret managers (HashiCorp Vault, AWS Secrets Manager)
# - Never commit secrets to Git! (Use sealed-secrets or external-secrets)
# - Use RBAC to limit who can read secrets
#
# Types of Secrets:
# - Opaque (generic key-value pairs)
# - kubernetes.io/dockerconfigjson (Docker registry credentials)
# - kubernetes.io/tls (TLS certificates)
# - kubernetes.io/service-account-token
#
# Creating Secrets:
#   # From literal values:
#   kubectl create secret generic app-secret \
#     --from-literal=SECRET_KEY=my-super-secret \
#     -n python-cicd-demo
#
#   # From file:
#   kubectl create secret generic app-secret \
#     --from-file=./secret.properties \
#     -n python-cicd-demo
#
#   # Base64 encode a value:
#   echo -n "my-secret-value" | base64
#
#   # Base64 decode a value:
#   echo "bXktc2VjcmV0LXZhbHVl" | base64 --decode
#
# Commands:
#   kubectl get secrets -n python-cicd-demo
#   kubectl describe secret app-secret -n python-cicd-demo
#   kubectl get secret app-secret -n python-cicd-demo -o yaml
#
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: python-cicd-demo
  labels:
    app: python-cicd-demo
    component: secrets
type: Opaque
data:
  # Base64 encoded values
  # echo -n "super-secret-key-change-in-production" | base64
  SECRET_KEY: c3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
  
  # echo -n "admin" | base64
  DB_USERNAME: YWRtaW4=
  
  # echo -n "password123" | base64
  DB_PASSWORD: cGFzc3dvcmQxMjM=
  
  # echo -n "redis://redis:6379/0" | base64
  REDIS_URL: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=

# =============================================================================
# PRODUCTION SECRET MANAGEMENT:
# =============================================================================
#
# Option 1: Sealed Secrets (Bitnami)
#   - Encrypts secrets that can be safely stored in Git
#   - Controller in cluster decrypts them
#   - kubeseal CLI tool
#
# Option 2: External Secrets Operator
#   - Syncs secrets from external stores (AWS, GCP, Vault)
#   - Automatic rotation
#
# Option 3: HashiCorp Vault
#   - Industry standard secret management
#   - Dynamic secrets, leasing, rotation
#   - Audit logging
#
# Option 4: Cloud Provider Solutions
#   - AWS Secrets Manager + CSI Driver
#   - Azure Key Vault
#   - GCP Secret Manager
#
# =============================================================================

